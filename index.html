<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Trading Terminal V29 Institutional</title><link rel="manifest" href="/manifest.json"><style>
:root{--bg:#06111f;--card:#0b1b30;--line:#1d4774;--txt:#f7fbff;--muted:#9bc7ef;--a:#1f8cff;--b:#18d1c5;--g:#19d27b;--r:#ff4e6a;--y:#ffd23f}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#071426,#020811);color:var(--txt);font-family:Arial,Helvetica,sans-serif}.wrap{max-width:1300px;margin:auto;padding:24px}.top{display:flex;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap}.title{font-size:30px;font-weight:900}.title span{color:var(--a)}.pill,.btn{border:1px solid var(--line);background:#0d223b;color:var(--txt);border-radius:14px;padding:10px 14px;font-weight:700}.btn{cursor:pointer;background:linear-gradient(135deg,var(--a),var(--b));border:0}.tabs{display:flex;gap:10px;overflow:auto;margin:22px 0}.tab{white-space:nowrap}.tab.active{background:linear-gradient(135deg,var(--a),var(--b));color:#001225}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{background:rgba(11,27,48,.92);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 10px 28px #0005}.card h2,.card h3{margin:0 0 12px}.big{font-size:28px;font-weight:900;color:var(--g)}.warn{color:var(--y)}.bad{color:var(--r)}.muted{color:var(--muted)}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #18395e;padding:10px;text-align:left}th{color:var(--muted)}.wide{grid-column:span 2}.full{grid-column:1/-1}input,select{background:#08172a;border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:10px}@media(max-width:900px){.grid{grid-template-columns:1fr}.wide{grid-column:auto}.wrap{padding:14px}.title{font-size:24px}}
</style></head><body><div class="wrap"><div class="top"><div><div class="title">AI Trading Terminal <span>V29 Institutional</span></div><div class="muted">Vercel live APIs • Upstox-ready • Intraday • Swing • MACD/RSI • Naked Calls/Puts • Mobile PWA</div></div><div><button class="btn" id="install">Install App</button> <span class="pill" id="status">Checking...</span></div></div><div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap"><input id="base" placeholder="API base blank for same Vercel" style="min-width:320px"><select id="interval"><option value="15000">15 sec</option><option value="30000" selected>30 sec</option><option value="60000">60 sec</option></select><button class="btn" onclick="refresh()">Refresh Now</button></div><div class="tabs" id="tabs"></div><main class="grid" id="app"></main><p class="muted" style="text-align:center">Educational analysis only. Confirm live price, OI, volume, risk and news before trading.</p></div><script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});let deferred;addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e});document.getElementById('install').onclick=()=>deferred&&deferred.prompt();
const tabs=['Dashboard','Intraday Bullish','Intraday Bearish','Swing Short Term','Swing Long Term','MACD Strategy','RSI Strategy','Naked Calls','Naked Puts','Manual Mode'];let active='Dashboard';const $=id=>document.getElementById(id);$('tabs').innerHTML=tabs.map(t=>`<button class="pill tab" onclick="active='${t}';render()">${t}</button>`).join('');function api(p){return ($('base').value||'')+p}async function get(p){const r=await fetch(api(p));if(!r.ok)throw new Error(r.status);return r.json()}function setTabs(){[...document.querySelectorAll('.tab')].forEach(b=>b.classList.toggle('active',b.textContent===active))}
async function refresh(){try{await get('/api/health');$('status').textContent='API live';$('status').style.color='#19d27b'}catch(e){$('status').textContent='API issue';$('status').style.color='#ff4e6a'}render()}async function render(){setTabs();const app=$('app');app.innerHTML='<div class="card full">Loading...</div>';try{if(active==='Dashboard'){const d=await get('/api/dashboard');app.innerHTML=`<div class="card"><h3>Nifty</h3><div class="big">${d.market.nifty}</div><div>${d.bias.nifty}</div></div><div class="card"><h3>BankNifty</h3><div class="big warn">${d.market.banknifty}</div><div>${d.bias.banknifty}</div></div><div class="card"><h3>Sensex</h3><div class="big">${d.market.sensex}</div><div>${d.bias.sensex}</div></div><div class="card"><h3>VIX / PCR</h3><div class="big warn">${d.market.indiaVix} / ${d.market.pcr}</div><div>Risk: ${d.risk}</div></div><div class="card wide"><h2>Today's AI Plan</h2><p>Trade only with VWAP + EMA + RSI + Volume + OI confirmation. Avoid first 5 minutes. Use strict SL.</p><p class="muted">Updated: ${d.updatedAt}</p></div><div class="card wide"><h2>Confirmation Filters</h2><span class="pill">VWAP</span> <span class="pill">EMA</span> <span class="pill">RSI</span> <span class="pill">MACD</span> <span class="pill">OI</span></div>`}else if(active.includes('Intraday')){const side=active.includes('Bearish')?'bearish':'bullish';const d=await get('/api/intraday?side='+side);app.innerHTML=`<div class="card full"><h2>${active}</h2><table><tr><th>Stock</th><th>Action</th><th>Entry</th><th>SL</th><th>T1</th><th>T2</th><th>Confidence</th></tr>${d.data.map(x=>`<tr><td>${x.stock}</td><td>${x.action}</td><td>${x.entry}</td><td>${x.stopLoss}</td><td>${x.target1}</td><td>${x.target2}</td><td>${x.confidence}%</td></tr>`).join('')}</table></div>`}else if(active.includes('Naked')){const d=await get('/api/options?symbol=NIFTY');const x=active.includes('Puts')?d.puts:d.calls;app.innerHTML=`<div class="card full"><h2>${active} - NIFTY</h2><table><tr><td>Spot</td><td>${d.spot}</td></tr><tr><td>PCR</td><td>${d.pcr}</td></tr><tr><td>Action</td><td>${x.action}</td></tr><tr><td>Strike</td><td>${x.strike}</td></tr><tr><td>Entry</td><td>${x.entry}</td></tr><tr><td>SL</td><td>${x.stopLoss}</td></tr><tr><td>Target</td><td>${x.target}</td></tr><tr><td>Confidence</td><td>${x.confidence}%</td></tr></table></div>`}else{const type=active.includes('RSI')?'rsi':active.includes('MACD')?'macd':'swing';const d=await get('/api/strategy?type='+type);app.innerHTML=`<div class="card full"><h2>${active}</h2><table><tr><th>Stock</th><th>Setup</th><th>Signal</th><th>Entry</th><th>SL</th><th>Confidence</th></tr>${d.data.map(x=>`<tr><td>${x.stock}</td><td>${x.setup}</td><td>${x.signal}</td><td>${x.entry}</td><td>${x.sl}</td><td>${x.confidence}%</td></tr>`).join('')}</table></div>`}}catch(e){app.innerHTML='<div class="card full"><h2 class="bad">API error</h2><p>Check /api/health and Vercel deployment.</p></div>'}}
setInterval(()=>refresh(),+$('interval').value);refresh();
</script></body></html>
