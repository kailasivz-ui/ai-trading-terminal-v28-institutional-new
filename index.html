<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="theme-color" content="#07111f"/><link rel="manifest" href="/manifest.json"/><title>AI Trading Terminal V28 Institutional</title><style>
:root{--bg:#050b13;--panel:#0b1728;--panel2:#0e2138;--border:#1c4c80;--text:#eef6ff;--muted:#9fc6f4;--blue:#2b8cff;--cyan:#18d3d3;--green:#22d47b;--red:#ff5d6c;--yellow:#ffc83d}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#061225,#03080e);color:var(--text);font-family:Inter,Arial,sans-serif}.wrap{max-width:1320px;margin:auto;padding:24px}header{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap}.title{font-size:34px;font-weight:900}.title span{color:var(--blue)}.sub{color:var(--muted);margin-top:6px}.pill,.btn{border:1px solid var(--border);background:#10223a;color:var(--text);border-radius:14px;padding:10px 14px;font-weight:800}.btn{cursor:pointer;background:linear-gradient(90deg,var(--blue),var(--cyan));border:0}.tabs{display:flex;gap:8px;overflow-x:auto;padding:18px 0}.tab{white-space:nowrap}.tab.active{background:linear-gradient(90deg,var(--blue),var(--cyan));color:#001223}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{background:rgba(11,23,40,.96);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.25)}.card h2,.card h3{margin:0 0 14px}.big{font-size:30px;font-weight:900}.green{color:var(--green)}.red{color:var(--red)}.yellow{color:var(--yellow)}table{width:100%;border-collapse:collapse}td,th{padding:11px;border-bottom:1px solid #153659;text-align:left}th{color:#b9d8ff}.wide{grid-column:span 2}.full{grid-column:1/-1}.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px}input,select{background:#071426;border:1px solid #244f80;color:var(--text);border-radius:12px;padding:12px;min-width:220px}.small{font-size:13px;color:var(--muted)}footer{text-align:center;color:var(--muted);padding:24px}@media(max-width:900px){.grid{grid-template-columns:1fr}.wide{grid-column:auto}.title{font-size:26px}.wrap{padding:14px}}
</style></head><body><div class="wrap"><header><div><div class="title">AI Trading Terminal <span>V28 Institutional</span></div><div class="sub">Vercel live backend • Upstox-ready • Intraday/Swing/MACD/RSI/Naked Options • Mobile PWA</div><div class="controls"><input id="apiBase" placeholder="API Base blank for same Vercel site"/><select id="refresh"><option value="15000">15 sec</option><option value="30000" selected>30 sec</option><option value="60000">1 min</option></select><button class="btn" onclick="saveBase()">Save</button><button class="btn" onclick="loadAll()">Refresh Now</button></div></div><div><button class="btn" id="installBtn" style="display:none">Install App</button> <span class="pill" id="status">Checking...</span></div></header><nav class="tabs" id="tabs"></nav><main class="grid" id="content"></main><footer>Educational analysis only. Confirm live price, OI, volume, risk and news before trade.</footer></div><script>
let base=localStorage.getItem('apiBase')||'';apiBase.value=base;const tabs=['Dashboard','Intraday Bullish','Intraday Bearish','Swing Short Term','MACD Strategy','RSI Strategy','Naked Calls','Naked Puts','Manual Mode'];let active='Dashboard';tabs.forEach(t=>{let b=document.createElement('button');b.className='pill tab'+(t===active?' active':'');b.textContent=t;b.onclick=()=>{active=t;renderTabs();loadAll()};tabsEl= document.getElementById('tabs');tabsEl.appendChild(b)});function renderTabs(){[...document.querySelectorAll('.tab')].forEach(b=>b.classList.toggle('active',b.textContent===active))}function saveBase(){base=apiBase.value.trim().replace(/\/$/,'');localStorage.setItem('apiBase',base);loadAll()}async function api(path){let r=await fetch((base||'')+path,{cache:'no-store'});if(!r.ok)throw new Error(path+' '+r.status);return r.json()}function badge(v,c=''){return `<span class="pill ${c}">${v}</span>`}function card(h,b,cls=''){return `<section class="card ${cls}"><h2>${h}</h2>${b}</section>`}async function loadAll(){try{let h=await api('/api/health');status.textContent='Backend live • '+h.mode;status.style.borderColor='#22d47b'}catch(e){status.textContent='Backend error';status.style.borderColor='#ff5d6c'}try{if(active==='Dashboard')await dashboard();if(active.includes('Intraday'))await intraday(active.includes('Bearish')?'bearish':'bullish');if(active.includes('Swing'))await swing();if(active.includes('MACD'))await strategy('macd');if(active.includes('RSI'))await strategy('rsi');if(active.includes('Naked'))await options(active.includes('Puts')?'put':'call');if(active.includes('Manual'))manual()}catch(e){content.innerHTML=card('Error',`<p class="red">${e.message}</p><p>Open <b>/api/health</b>. If 404, project files are not at GitHub root or Vercel config is wrong.</p>`,'full')}}async function dashboard(){let d=await api('/api/dashboard');let m=d.market;content.innerHTML=card('Nifty',`<div class="big green">${m.nifty}</div><p>${d.bias.nifty}</p>`)+card('BankNifty',`<div class="big yellow">${m.banknifty}</div><p>${d.bias.banknifty}</p>`)+card('Sensex',`<div class="big green">${m.sensex}</div><p>${d.bias.sensex}</p>`)+card('VIX / PCR',`<div class="big">${m.vix} / ${m.pcr}</div><p>Risk: ${d.riskMode}</p>`)+card("Today's AI Plan",`<p>${d.plan}</p><p class="small">Last update: ${m.timestamp}</p>`,'wide')+card('Live Mode Status',`<p>${d.live?'Upstox token detected. Live integration ready.':'Demo engine running. Add Upstox env variables in Vercel for real market data.'}</p><p>${badge('VWAP')} ${badge('EMA')} ${badge('RSI')} ${badge('MACD')} ${badge('OI')}</p>`,'wide')}
async function intraday(type){let d=await api('/api/intraday?type='+type);content.innerHTML=card(type==='bullish'?'Intraday Bullish Stocks':'Intraday Bearish Stocks',table(d.rows),'full')}function table(rows){return `<table><tr>${Object.keys(rows[0]||{}).map(k=>`<th>${k}</th>`).join('')}</tr>${rows.map(r=>`<tr>${Object.values(r).map(v=>`<td>${Array.isArray(v)?v.join(', '):v}</td>`).join('')}</tr>`).join('')}</table>`}async function strategy(name){let d=await api('/api/strategy?name='+name);content.innerHTML=card(name.toUpperCase()+' Strategy',table(d.rows),'full')}async function options(kind){let d=await api('/api/options?index=NIFTY');let x=kind==='put'?d.nakedPut:d.nakedCall;content.innerHTML=card('NIFTY '+(kind==='put'?'Naked Put':'Naked Call'),`<div class="big ${x.action.includes('BUY')?'green':'yellow'}">${x.action}</div><table><tr><td>Spot</td><td>${d.spot}</td></tr><tr><td>Bias</td><td>${d.bias}</td></tr><tr><td>Strike</td><td>${x.strike}</td></tr><tr><td>Entry</td><td>${x.entry}</td></tr><tr><td>SL</td><td>${x.stopLoss}</td></tr><tr><td>Target</td><td>${x.target}</td></tr><tr><td>Confidence</td><td>${x.confidence}%</td></tr></table>`,'full')}function swing(){content.innerHTML=card('Swing Short Term',table([{symbol:'HAL',view:'Bullish pullback',entry:'Near 20 EMA support',sl:'Below swing low',target:'1:2 RR',confidence:76},{symbol:'BEL',view:'Momentum continuation',entry:'Breakout retest',sl:'Below VWAP/20EMA',target:'Trail',confidence:74},{symbol:'L&T',view:'Capex theme',entry:'Above weekly resistance',sl:'Weekly close below support',target:'2-4 weeks',confidence:72}]),'full')}function manual(){content.innerHTML=card('Manual Mode',`<p>Paste live values from TradingView/NSE/Broker and use rules:</p><table><tr><td>BUY CE</td><td>Spot above VWAP + 9EMA > 20EMA + RSI >55 + Volume >1.5x + PCR supportive</td></tr><tr><td>BUY PE</td><td>Spot below VWAP + 9EMA < 20EMA + RSI <45 + Volume >1.5x + OI supports fall</td></tr></table>`,'full')}let timer;function loop(){clearInterval(timer);timer=setInterval(loadAll,Number(refresh.value))}refresh.onchange=loop;let deferred;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;installBtn.style.display='inline-block'});installBtn.onclick=()=>deferred&&deferred.prompt();if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});loadAll();loop();
</script></body></html>
